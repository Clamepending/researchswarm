name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -r services/orchestrator/requirements.txt
          pip install pytest ruff mypy
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Tests
        run: make test
