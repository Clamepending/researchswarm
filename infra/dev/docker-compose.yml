version: '3.9'
services:
  api:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: bash -lc "pip install -r services/orchestrator/requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir services/orchestrator"
    ports:
      - '8000:8000'
    depends_on:
      - db
      - redis

  web:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: bash -lc "cd apps/web && python -m http.server 3000"
    ports:
      - '3000:3000'
    depends_on:
      - api

  worker:
    image: python:3.11-slim
    working_dir: /workspace
    volumes:
      - ../../:/workspace
    command: bash -lc "python -c 'print(\"runner worker stub started\")'"
    depends_on:
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: researchswarm
      POSTGRES_PASSWORD: researchswarm
      POSTGRES_DB: researchswarm
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'
